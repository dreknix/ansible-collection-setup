---

- name: Install package 'locales'
  become: true
  ansible.builtin.apt:
    name:
      - locales
    state: present

- name: Install locale definitions
  become: true
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  with_items: "{{ locale_list }}"

- name: Write locale configuration
  become: true
  ansible.builtin.template:
    src: locale.conf.j2
    dest: /etc/locale.conf
    owner: root
    group: root
    mode: "u=rw,go=r"

- name: Ensure /etc/default/locale is a link
  become: true
  ansible.builtin.file:
    src: /etc/locale.conf
    dest: /etc/default/locale
    state: link
    force: true

...
