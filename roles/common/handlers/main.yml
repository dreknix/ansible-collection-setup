---
- name: Restart application service
  become: true
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible due to config change"
    reboot_timeout: 600        # max seconds to wait for the host to come back
    connect_timeout: 5         # seconds to wait for a connection attempt
    pre_reboot_delay: 0        # delay before the reboot command runs
    post_reboot_delay: 30      # delay after reboot before testing the connection
  listen: "Reboot host"
...
